<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GoFit — Workouts</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0a14;
            --surface: #1a1224;
            --surface2: #21172e;
            --border: #2d1f3d;
            --accent: #d8a6ff;
            --accent-dim: #c084fc;
            --text: #f5ecff;
            --muted: #b8a7cc;
            --danger: #ff7aa2;
            --sidebar-w: 220px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 28px 16px;
            position: fixed;
            top: 0; left: 0; bottom: 0;
        }

        .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem; letter-spacing: -1px; margin-bottom: 36px; padding-left: 8px; }
        .logo span { color: var(--accent); }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            color: var(--muted);
            font-size: 0.92rem;
            font-weight: 500;
            transition: all 0.18s;
            margin-bottom: 4px;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }
        .nav-item:hover { color: var(--text); background: var(--surface2); }
        .nav-item.active { color: var(--accent); background: rgba(216,166,255,0.12); }
        .nav-item .icon { font-size: 1.1rem; width: 20px; text-align: center; }

        .sidebar-footer {
            margin-top: auto;
        }

        /* REPARARE BUTON LOGOUT */
        .logout-btn {
            display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px;
            cursor: pointer; color: var(--danger); font-size: 0.92rem; font-weight: 500;
            border: none; background: none; width: 100%; text-align: left; transition: background 0.18s;
        }
        .logout-btn:hover { background: rgba(255, 95, 95, 0.08); }

        .main {
            margin-left: var(--sidebar-w);
            flex: 1;
            padding: 36px 40px; /* Padding identic cu dashboard */
            max-width: 1100px;  /* Redus de la 1200px la 1100px pentru a nu mai părea "întins" */
            width: calc(100% - var(--sidebar-w));
        }
        .page-header { margin-bottom: 32px; }
        .page-header h1 { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 700; }
        .greeting-sub { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }

        .workout-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Două coloane egale */
            gap: 24px;
            align-items: start;
        }
        .section-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.1rem; margin-bottom: 16px; }

        /* ── VIDEO CARD ── */
        .video-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
            padding: 20px; margin-bottom: 20px; transition: transform 0.2s;
        }
        .video-card:hover { transform: translateY(-4px); border-color: var(--accent); }
        .video-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .ex-name { font-weight: 700; font-size: 1.1rem; color: var(--text); }
        .ex-reps { color: var(--accent); font-family: 'Syne', sans-serif; font-weight: 800; font-size: 0.95rem; }

        .video-container {
            width: 100%; aspect-ratio: 16/9; border-radius: 12px; overflow: hidden;
            background: #000; border: 1px solid var(--border);
        }
        .video-container iframe { width: 100%; height: 100%; }

        /* ── WORKOUT LIST ── */
        .workout-list { display: flex; flex-direction: column; gap: 12px; }
        .workout-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
            padding: 14px 18px; display: flex; align-items: center; gap: 14px;
        }
        .workout-icon {
            width: 40px; height: 40px; background: rgba(216,166,255,0.1);
            border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
        }
        .workout-info { flex: 1; }
        .workout-name { font-weight: 600; font-size: 0.9rem; }
        .workout-meta { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
        .workout-cals { font-family: 'Syne', sans-serif; font-weight: 700; color: var(--accent); font-size: 0.9rem; }

        /* ── REPARARE BUTOANE (MARK AS FINISHED & ADD) ── */
        .btn-save, .btn-add {
            padding: 12px 18px; background: var(--accent); color: #0a0a0a;
            border: none; border-radius: 10px; font-family: 'Syne', sans-serif;
            font-weight: 700; cursor: pointer; font-size: 0.9rem; transition: background 0.2s;
        }
        .btn-save:hover, .btn-add:hover { background: var(--accent-dim); }

        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 100; align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal { background: var(--surface); padding: 32px; border-radius: 24px; width: 400px; border: 1px solid var(--border); }
        .modal input, .modal select {
            width: 100%; padding: 12px; background: var(--surface2); border: 1px solid var(--border);
            border-radius: 10px; color: var(--text); margin: 8px 0 16px; outline: none;
        }

        .workout-card {
            position: relative; /* Necesar pentru a poziționa butonul X absolut */
        }

        .delete-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 22px;
            height: 22px;
            background: rgba(255, 122, 162, 0.1);
            color: var(--danger);
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
            opacity: 0; /* Ascuns implicit */
            transition: all 0.2s;
        }
        .admin-link {
            border: 1px solid rgba(216, 166, 255, 0.2);
            background: rgba(216, 166, 255, 0.05);
            transition: all 0.3s ease;
        }

        .admin-link:hover {
            background: rgba(216, 166, 255, 0.15) !important;
            border-color: var(--accent);
        }
        .workout-card:hover .delete-btn {
            opacity: 1; /* Apare la hover */
            background: rgba(255, 122, 162, 0.2);
        }

        .delete-btn:hover {
            background: var(--danger) !important;
            color: #fff !important;
        }

        .empty-state { text-align: center; padding: 40px; color: var(--muted); font-size: 0.9rem; border: 1px dashed var(--border); border-radius: 20px; }
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="logo">Go<span>Fit</span></div>
    <button class="nav-item" onclick="window.location.href='dashboard.html?page=overview'">
        <span class="icon">📊</span> Overview
    </button>
    <button class="nav-item active">
        <span class="icon">🏋️</span> Workouts
    </button>
    <button class="nav-item" onclick="window.location.href='nutrition.html'">
        <span class="icon">🍎</span> Nutrition
    </button>
    <button class="nav-item" onclick="window.location.href='dashboard.html?page=profile'">
        <span class="icon">👤</span> Profile
    </button>
    <div class="sidebar-footer">
        <button id="adminBtn" class="nav-item" onclick="window.location.href='admin_dashboard.html'" style="display: none; color: var(--accent); margin-bottom: 10px;">
            <span class="icon">🛡️</span> Admin Panel
        </button>

        <button class="logout-btn" onclick="logout()">
            <span class="icon">🚪</span> Logout
        </button>
    </div>
</nav>

<main class="main">
    <div class="page-header">
        <h1>Workouts</h1>
        <div class="greeting-sub">Follow your plan or log a manual session</div>
    </div>

    <div class="weekly-nav" id="weeklyNav" style="display: flex; gap: 10px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 10px;">
    </div>

    <div class="workout-grid">
        <div>
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;">
                <div class="section-title">Today's Recommended Plan</div>
            </div>
            <div id="recommendedExercises">
                <div class="empty-state">Loading plan...</div>
            </div>
        </div>

        <div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <div class="section-title" style="margin-bottom: 0;">Today's Sessions</div>
                <button class="btn-add" onclick="openModal()">+ Add Session</button>
            </div>
            <div id="workoutList" class="workout-list">
                <div class="empty-state">Loading sessions...</div>
            </div>
        </div>
    </div>
</main>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h2 style="font-family: 'Syne'; margin-bottom: 20px;">Log Session</h2>
        <label style="font-size: 0.72rem; color: var(--muted); text-transform: uppercase;">Workout Name</label>
        <input type="text" id="w-name" placeholder="Morning Run">
        <label style="font-size: 0.72rem; color: var(--muted); text-transform: uppercase;">Type</label>
        <select id="w-type">
            <option value="Strength">Strength</option>
            <option value="Cardio">Cardio</option>
            <option value="Flexibility">Flexibility</option>
        </select>
        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label style="font-size: 0.7rem;">Duration (min)</label>
                <input type="number" id="w-duration" placeholder="45">
            </div>
            <div style="flex: 1;">
                <label style="font-size: 0.7rem;">Kcal Burned</label>
                <input type="number" id="w-calories" placeholder="300">
            </div>
        </div>
        <div style="display: flex; gap: 12px; margin-top: 10px;">
            <button onclick="closeModal()" style="flex: 1; padding: 12px; background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 10px; cursor: pointer;">Cancel</button>
            <button onclick="saveWorkout()" class="btn-save" style="flex: 2;">Save Session</button>
        </div>
    </div>
</div>

<script>
    const API = "http://localhost:8083";
    const token = localStorage.getItem("token");
    const headers = { "Content-Type": "application/json", "Authorization": "Bearer " + token };

    if (!token) window.location.href = "index.html";

    async function loadRecommended() {
        const container = document.getElementById("recommendedExercises");
        const nav = document.getElementById("weeklyNav");

        try {
            const res = await fetch(API + "/workouts/plan", { headers });
            const weeklyPlan = await res.json();
            const days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
            const today = new Date().toLocaleDateString('en-US', { weekday: 'long' });

            // 1. Generăm Navigarea Săptămânală (Fixăm aspectul mic)
            nav.innerHTML = days.map(day => {
                const exercises = weeklyPlan[day] || [];
                // MODIFICĂ ACEASTĂ PARTE ÎN JS:
                let theme = "Rest Day";
                if (exercises.length > 0) {
                    // Luăm textul direct din baza de date (coloana muscleGroup)
                    theme = exercises[0].muscleGroup || "Workout";
                }

                const isActive = day === today ? 'active' : '';
                // Am adăugat background și border pentru a nu mai fi "mici" și plutitoare
                return `
                <div class="nav-item ${isActive}" style="min-width: 120px; text-align: center; padding: 15px; border: 1px solid var(--border); background: var(--surface2); flex-direction: column;">
                    <div style="font-weight: 800; color: var(--accent); font-size: 0.9rem;">${day.substring(0,3)}</div>
                    <div style="color: var(--muted); font-size: 0.75rem; margin-top: 5px;">${theme}</div>
                </div>
            `;
            }).join("");

            // 2. AFIȘĂM EXERCIȚIILE PENTRU ZIUA DE AZI (Reparăm disparitia workout-urilor)
            const exercises = weeklyPlan[today] || [];

            if (exercises.length === 0) {
                container.innerHTML = `<div class="empty-state">Enjoy your rest day! 🧘‍♂️</div>`;
                return;
            }

            // Identificăm tema zilei pentru titlu
            const mainMuscleGroup = exercises[0].muscleGroup || "";
            let dayTheme = "Training Session";
            if (mainMuscleGroup.includes("Legs")) dayTheme = "Leg Day 🦵";
            else if (mainMuscleGroup.includes("Chest")) dayTheme = "Push Day 🚀";
            else if (mainMuscleGroup.includes("Back")) dayTheme = "Pull Day 🏗️";
            else if (mainMuscleGroup.includes("Cardio") || mainMuscleGroup.includes("HIIT")) dayTheme = "Fat Burn 🔥";

            let html = `<h2 class="section-title" style="color: var(--accent); margin-bottom: 20px; font-size: 1.2rem;">${today} — ${dayTheme}</h2>`;

            html += exercises.map(ex => {
                const videoId = ex.videoUrl.split('v=')[1]?.split('&')[0] || "";
                return `
                <div class="video-card">
                    <div class="video-header">
                        <div>
                            <div class="ex-name">${ex.name}</div>
                            <div style="font-size: 0.8rem; color: var(--muted)">Target: ${ex.muscleGroup}</div>
                        </div>
                        <div class="ex-reps">${ex.setsReps}</div>
                    </div>
                    <div class="video-container">
                        <iframe src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>
                    </div>
                </div>
            `;
            }).join("");

            // Adăugăm butonul de finalizare
            html += `
            <button class="btn-save" style="width: 100%; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px;" onclick="completeWorkout()">
                <span>✅</span> Mark Today's Workout as Finished
            </button>
        `;

            container.innerHTML = html;

        } catch (e) {
            console.error(e);
            container.innerHTML = `<div class="empty-state">Error loading plan.</div>`;
        }
    }

    async function loadWorkouts() {
        const list = document.getElementById("workoutList");
        try {
            const res = await fetch(API + "/workouts/today", { headers });
            const workouts = await res.json();
            const icons = { Strength: "🏋️", Cardio: "🏃", Flexibility: "🧘" };

            if (!workouts.length) {
                list.innerHTML = `<div class="empty-state">No sessions logged.</div>`;
                return;
            }

            list.innerHTML = workouts.map(w => `
    <div class="workout-card">
        <button class="delete-btn" onclick="deleteWorkout(${w.id})">✕</button>
        <div class="workout-icon">${icons[w.type] || "💪"}</div>
        <div class="workout-info">
            <div class="workout-name">${w.name}</div>
            <div class="workout-meta">${w.type} · ${w.durationMinutes} min</div>
        </div>
        <div class="workout-cals">−${w.caloriesBurned} kcal</div>
    </div>
`).join("");
        } catch (e) { list.innerHTML = `<div class="empty-state">Error loading logs.</div>`; }
    }

    function openModal() { document.getElementById("modalOverlay").classList.add("open"); }
    function closeModal() { document.getElementById("modalOverlay").classList.remove("open"); }

    async function saveWorkout() {
        const name = document.getElementById("w-name").value;
        const duration = document.getElementById("w-duration").value;
        const calories = document.getElementById("w-calories").value;
        if(!name || !duration || !calories) { alert("Please fill all fields"); return; }

        const data = {
            name: name,
            type: document.getElementById("w-type").value,
            durationMinutes: parseInt(duration),
            caloriesBurned: parseInt(calories)
        };
        const res = await fetch(API + "/workouts", { method: "POST", headers, body: JSON.stringify(data) });
        if (res.ok) { closeModal(); loadWorkouts(); }
    }

    async function completeWorkout() {
        if (!confirm("Did you finish all exercises? This will log the session automatically.")) return;
        const data = {
            name: "Daily Plan Completed",
            type: "Strength",
            durationMinutes: 45,
            caloriesBurned: 350,
            notes: "Logged from recommended plan"
        };
        try {
            const res = await fetch(API + "/workouts", { method: "POST", headers, body: JSON.stringify(data) });
            if (res.ok) { alert("Great job! Session logged."); loadWorkouts(); }
        } catch (e) { alert("Error logging workout."); }
    }

    function logout() { localStorage.removeItem("token"); window.location.href = "index.html"; }

    async function deleteWorkout(id) {
        if (!confirm("Are you sure you want to delete this session?")) return;

        try {
            const res = await fetch(`${API}/workouts/${id}`, {
                method: "DELETE",
                headers: headers
            });

            if (res.ok) {
                loadWorkouts(); // Reîncărcăm lista după ștergere
            } else {
                alert("Failed to delete the workout.");
            }
        } catch (e) {
            console.error("Error deleting workout:", e);
        }
    }
    async function checkAdminAccess() {
        try {
            const res = await fetch(API + "/user/me", { headers });
            const u = await res.json();

            if (u.role === 'ADMIN' || u.role === 'admin') {
                document.getElementById("adminBtn").style.display = "flex";
            }
        } catch (e) {
            console.error("Admin check failed", e);
        }
    }

    // Apelează funcția
    checkAdminAccess();

    loadRecommended();
    loadWorkouts();
</script>
</body>
</html>
