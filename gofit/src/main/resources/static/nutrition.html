<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GoFit — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0a14;
            --surface: #1a1224;
            --surface2: #21172e;
            --border: #2d1f3d;
            --accent: #d8a6ff;
            --accent-dim: #c084fc;
            --text: #f5ecff;
            --muted: #b8a7cc;
            --danger: #ff7aa2;
            --sidebar-w: 220px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 28px 16px;
            position: fixed;
            top: 0; left: 0; bottom: 0;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -1px;
            margin-bottom: 36px;
            padding-left: 8px;
        }
        .logo span { color: var(--accent); }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            color: var(--muted);
            font-size: 0.92rem;
            font-weight: 500;
            transition: all 0.18s;
            margin-bottom: 4px;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }
        .nav-item:hover { color: var(--text); background: var(--surface2); }
        .nav-item.active { color: var(--accent); background: rgba(216,166,255,0.12); }
        .nav-item .icon { font-size: 1.1rem; width: 20px; text-align: center; }

        .sidebar-footer {
            margin-top: auto;
        }
        .logout-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            color: var(--danger);
            font-size: 0.92rem;
            font-weight: 500;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            transition: background 0.18s;
        }
        .logout-btn:hover { background: rgba(255,95,95,0.08); }

        /* ── MAIN ── */
        .main {
            margin-left: var(--sidebar-w);
            flex: 1;
            padding: 36px 40px;
            max-width: 1100px;
        }

        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

        /* ── HEADER ── */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 32px;
        }
        .page-header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .greeting-sub { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }

        /* ── STAT CARDS ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            transition: border-color 0.2s;
        }
        .stat-card:hover { border-color: #3a3a3a; }
        .stat-label {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin-bottom: 8px;
        }
        .stat-value {
            font-family: 'Syne', sans-serif;
            font-size: 1.7rem;
            font-weight: 700;
            letter-spacing: -1px;
        }
        .stat-value.accent { color: var(--accent); }
        .stat-unit { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }

        /* ── BMI BAR ── */
        .bmi-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 28px;
        }
        .section-title {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 16px;
            letter-spacing: -0.3px;
        }
        .bmi-bar-track {
            height: 10px;
            border-radius: 99px;
            background: linear-gradient(to right, #5af5c8 0%, #c8f55a 25%, #f5d05a 50%, #f5905a 75%, #ff5f9e 100%);
            position: relative;
            margin-bottom: 8px;
        }
        .bmi-marker {
            width: 14px; height: 14px;
            background: white;
            border: 2px solid var(--bg);
            border-radius: 50%;
            position: absolute;
            top: -2px;
            transform: translateX(-50%);
            transition: left 0.6s ease;
            box-shadow: 0 0 0 2px var(--accent);
        }
        .bmi-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--muted);
        }
        .bmi-status {
            font-size: 0.85rem;
            margin-top: 10px;
            color: var(--muted);
        }
        .bmi-status strong { color: var(--text); }

        /* ── CALORIES RING ── */
        .calories-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 32px;
        }
        .ring-wrap { position: relative; width: 100px; height: 100px; flex-shrink: 0; }
        .ring-wrap svg { transform: rotate(-90deg); }
        .ring-center {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
        }
        .ring-center small { font-size: 0.6rem; color: var(--muted); font-family: 'DM Sans', sans-serif; font-weight: 400; }
        .calories-info h3 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; margin-bottom: 6px; }
        .calories-info p { font-size: 0.85rem; color: var(--muted); line-height: 1.5; }
        .goal-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 99px;
            background: rgba(216,166,255,0.12);
            color: var(--accent);
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 8px;
            letter-spacing: 0.04em;
        }

        /* ── WORKOUTS ── */
        .workouts-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .btn-add {
            padding: 8px 18px;
            background: var(--accent);
            color: #0a0a0a;
            border: none;
            border-radius: 8px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-add:hover { background: var(--accent-dim); }

        .workout-list { display: flex; flex-direction: column; gap: 10px; }
        .workout-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: border-color 0.2s;
        }
        .workout-card:hover { border-color: #3a3a3a; }
        .workout-icon {
            width: 42px; height: 42px;
            background: rgba(216,166,255,0.12);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        .workout-info { flex: 1; }
        .workout-name { font-weight: 600; font-size: 0.95rem; }
        .workout-meta { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
        .workout-cals {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            color: var(--accent);
            font-size: 0.9rem;
        }
        .workout-delete {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 1rem;
            padding: 4px 8px;
            border-radius: 6px;
            transition: color 0.2s, background 0.2s;
        }
        .workout-delete:hover { color: var(--danger); background: rgba(255,95,95,0.08); }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--muted);
            font-size: 0.9rem;
        }
        .empty-state .big { font-size: 2.5rem; margin-bottom: 8px; }

        /* ── MODAL ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            width: 380px;
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
        .modal h2 { font-family: 'Syne', sans-serif; font-weight: 700; margin-bottom: 20px; }

        .modal label {
            display: block;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin-bottom: 5px;
            margin-top: 12px;
        }
        .modal input, .modal select {
            width: 100%;
            padding: 10px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            outline: none;
        }
        .modal input:focus, .modal select:focus { border-color: var(--accent); }
        .modal select option { background: var(--surface); }

        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .btn-cancel {
            flex: 1; padding: 10px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted);
            cursor: pointer;
            font-family: 'Syne', sans-serif;
            font-weight: 600;
        }
        .btn-cancel:hover { color: var(--text); }
        .btn-save {
            flex: 2; padding: 10px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: #0a0a0a;
            cursor: pointer;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            transition: background 0.2s;
        }
        .btn-save:hover { background: var(--accent-dim); }

        /* ── PROFILE PAGE ── */
        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .profile-field {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px 20px;
        }
        .profile-field .pf-label {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin-bottom: 6px;
        }
        .profile-field .pf-value {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1.15rem;
        }
        .admin-link {
            border: 1px solid rgba(216, 166, 255, 0.2);
            background: rgba(216, 166, 255, 0.05);
            transition: all 0.3s ease;
        }

        .admin-link:hover {
            background: rgba(216, 166, 255, 0.15) !important;
            border-color: var(--accent);
        }
        .sidebar-footer {
            margin-top: auto; /* Împinge butonul jos de tot */
        }

        .logout-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            color: var(--danger);
            font-size: 0.92rem;
            font-weight: 500;
            border: none;      /* ASTA lipsește probabil */
            background: none;  /* ȘI ASTA lipsește */
            width: 100%;
            text-align: left;
            transition: background 0.18s;
        }

        .logout-btn:hover {
            background: rgba(255, 95, 95, 0.08); /* Un fundal subtil la hover */
        }

        /* loading skeleton */
        .skeleton {
            background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite;
            border-radius: 8px;
            height: 1.2rem;
            width: 60%;
        }
        @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar">
    <div class="logo">Go<span>Fit</span></div>

    <button class="nav-item" onclick="window.location.href='dashboard.html?page=overview'">
        <span class="icon">📊</span> Overview
    </button>
    <button class="nav-item" onclick="window.location.href='workouts.html'">
        <span class="icon">🏋️</span> Workouts
    </button>
    <button class="nav-item active" onclick="window.location.href='nutrition.html'">
        <span class="icon">🍎</span> Nutrition
    </button>
    <button class="nav-item" onclick="window.location.href='dashboard.html?page=profile'">
        <span class="icon">👤</span> Profile
    </button>

    <div class="sidebar-footer">
        <button id="adminBtn" class="nav-item" onclick="window.location.href='admin_dashboard.html'" style="display: none; color: var(--accent); margin-bottom: 10px;">
            <span class="icon">🛡️</span> Admin Panel
        </button>

        <button class="logout-btn" onclick="logout()">
            <span class="icon">🚪</span> Logout
        </button>
    </div>
</nav>

<!-- MAIN -->
<main class="main">
    <div class="page active">
        <div class="page-header">
            <div>
                <h1>My Nutrition Plan</h1>
                <div class="greeting-sub">7-day personalized meal plan</div>
            </div>
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 25px;" id="daysNav">
            <button class="nav-item active" style="width: auto;" onclick="renderDay('Monday', this)">Mon</button>
            <button class="nav-item" style="width: auto;" onclick="renderDay('Tuesday', this)">Tue</button>
            <button class="nav-item" style="width: auto;" onclick="renderDay('Wednesday', this)">Wed</button>
            <button class="nav-item" style="width: auto;" onclick="renderDay('Thursday', this)">Thu</button>
            <button class="nav-item" style="width: auto;" onclick="renderDay('Friday', this)">Fri</button>
            <button class="nav-item" style="width: auto;" onclick="renderDay('Saturday', this)">Sat</button>
            <button class="nav-item" style="width: auto;" onclick="renderDay('Sunday', this)">Sun</button>
        </div>

        <div class="workout-list" id="mealList">
            <div class="empty-state">Loading your plan...</div>
        </div>
    </div>
</main>

<!-- ADD WORKOUT MODAL -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h2>Log Workout</h2>
        <label>Workout Name</label>
        <input type="text" id="w-name" placeholder="e.g. Push Day, Morning Run">
        <label>Type</label>
        <select id="w-type">
            <option value="Strength">Strength</option>
            <option value="Cardio">Cardio</option>
            <option value="Flexibility">Flexibility</option>
            <option value="Sports">Sports</option>
            <option value="Other">Other</option>
        </select>
        <label>Duration (minutes)</label>
        <input type="number" id="w-duration" placeholder="45" min="1">
        <label>Calories Burned</label>
        <input type="number" id="w-calories" placeholder="300" min="0">
        <label>Notes (optional)</label>
        <input type="text" id="w-notes" placeholder="How did it go?">
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-save" onclick="saveWorkout()">Save</button>
        </div>
    </div>
</div>

<script>
    const API = "http://localhost:8083";
    const token = localStorage.getItem("token");
    const headers = {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
    };

    let fullPlan = {}; // Aici vom salva planul primit de la Backend

    const mealIcons = {
        "Breakfast": "🍳",
        "Snack 1": "🍎",
        "Lunch": "🍗",
        "Snack 2": "🍌",
        "Dinner": "🍽️"
    };

    async function loadNutrition() {
        try {
            const res = await fetch(API + "/api/nutrition/plan", { headers });
            fullPlan = await res.json();
            renderDay("Monday"); // Afișăm luni implicit
        } catch (e) {
            console.error("Error:", e);
            document.getElementById("mealList").innerHTML = "Error loading plan. Check if database has meals.";
        }
    }

    let macroChartInstance = null; // Reținem chart-ul ca să-l putem distruge la redeschidere

    function renderDay(day, btn = null) {
        if(btn) {
            document.querySelectorAll("#daysNav .nav-item").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
        }

        const container = document.getElementById("mealList");
        const meals = fullPlan[day] || [];

        if (meals.length === 0) {
            container.innerHTML = `<div class="empty-state">No meals found for ${day}.</div>`;
            return;
        }

        // MODIFICAREA ESTE AICI:
        container.innerHTML = meals.map((m, index) => {
            // Alegem iconița corectă sau punem salata (🥗) ca backup
            const icon = mealIcons[m.mealType] || "🥗";

            return `
        <div class="workout-card" style="cursor: pointer;" onclick="showMealDetail('${day}', ${index})">
            <div class="workout-icon">${icon}</div>
            <div class="workout-info">
                <div class="workout-name">${m.mealType}: ${m.name}</div>
                <div class="workout-meta">${m.ingredients}</div>
            </div>
            <div class="workout-cals" style="text-align: right;">
                ${m.calories} kcal<br>
                <small style="color: var(--muted)">Click for macros</small>
            </div>
        </div>
        `;
        }).join("");
    }

    function showMealDetail(day, index) {
        const meal = fullPlan[day][index];

        document.getElementById("m-detail-title").innerText = meal.name;
        document.getElementById("m-detail-type").innerText = meal.mealType;

        // 1. Logica pentru Macro-nutrienți (Text lateral)
        document.getElementById("m-detail-macros").innerHTML = `
        <div style="margin-bottom: 8px;"><strong style="color: #ff7aa2">● Protein:</strong> ${meal.protein}g</div>
        <div style="margin-bottom: 8px;"><strong style="color: #5af5c8">● Carbs:</strong> ${meal.carbs}g</div>
        <div style="margin-bottom: 8px;"><strong style="color: #f5d05a">● Fats:</strong> ${meal.fats}g</div>
        <div style="margin-top: 15px; font-size: 1.1rem; font-family: 'Syne'; border-top: 1px solid var(--border); pt-10">
            ${meal.calories} <small>kcal</small>
        </div>
    `;

        // 2. Logica pentru listarea ingredientelor (UNA SUB ALTA)
        const ingredientsContainer = document.getElementById("m-detail-ingredients");
        ingredientsContainer.innerHTML = meal.ingredients.split(",").map(item => {
            const parts = item.trim().split(" "); // Presupunem formatul "150g Nume"
            const weight = parts[0];
            const name = parts.slice(1).join(" ");
            return `
            <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05);">
                <span>${name}</span>
                <span style="color: var(--accent); font-weight: 700;">${weight}</span>
            </div>
        `;
        }).join("");

        document.getElementById("mealModalOverlay").classList.add("open");

        // 3. Generare Pie Chart (Rămâne neschimbat)
        const ctx = document.getElementById('macroChart').getContext('2d');
        if (macroChartInstance) macroChartInstance.destroy();
        macroChartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Protein', 'Carbs', 'Fats'],
                datasets: [{
                    data: [meal.protein, meal.carbs, meal.fats],
                    backgroundColor: ['#ff7aa2', '#5af5c8', '#f5d05a'],
                    borderWidth: 0
                }]
            },
            options: { plugins: { legend: { display: false } }, cutout: '75%' }
        });
    }

    function closeMealModal() {
        document.getElementById("mealModalOverlay").classList.remove("open");
    }

    async function checkAdminAccess() {
        try {
            const res = await fetch(API + "/user/me", { headers });
            const u = await res.json();

            if (u.role === 'ADMIN' || u.role === 'admin') {
                document.getElementById("adminBtn").style.display = "flex";
            }
        } catch (e) {
            console.error("Admin check failed", e);
        }
    }

    // Apelează funcția
    checkAdminAccess();

    // Pornim încărcarea datelor
    loadNutrition();
    function logout() {
        // 1. Ștergem token-ul și orice alte date salvate
        localStorage.removeItem("token");
        localStorage.removeItem("userEmail"); // Dacă îl salvezi și pe acesta

        // 2. Opțional: Curățăm și sessionStorage dacă îl folosești
        sessionStorage.clear();

        // 3. Redirecționăm utilizatorul către pagina de Login sau Index
        window.location.href = "index.html";
    }
</script>
<div class="modal-overlay" id="mealModalOverlay">
    <div class="modal" style="width: 450px;">
        <h2 id="m-detail-title" style="margin-bottom: 5px;">Meal Details</h2>
        <div id="m-detail-type" class="goal-badge" style="margin-bottom: 20px;"></div>

        <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 25px;">
            <div style="width: 150px; height: 150px;">
                <canvas id="macroChart"></canvas>
            </div>
            <div id="m-detail-macros" style="font-size: 0.9rem; line-height: 1.8;">
            </div>
        </div>

        <label>Ingredients & Portions</label>
        <div id="m-detail-ingredients" style="background: var(--surface2); padding: 15px; border-radius: 10px; margin-bottom: 20px;">
        </div>

        <button class="btn-save" style="width: 100%;" onclick="closeMealModal()">Close</button>
    </div>
</div>
</body>
</html>
