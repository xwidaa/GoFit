<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GoFit — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0a14;
            --surface: #1a1224;
            --surface2: #21172e;
            --border: #2d1f3d;
            --accent: #d8a6ff;
            --accent-dim: #c084fc;
            --text: #f5ecff;
            --muted: #b8a7cc;
            --danger: #ff7aa2;
            --sidebar-w: 240px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }

        /* ── SIDEBAR ── */
        .sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 28px 16px; position: fixed; top: 0; left: 0; bottom: 0; }
        .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem; letter-spacing: -1px; margin-bottom: 36px; padding-left: 8px; }
        .logo span { color: var(--accent); }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; cursor: pointer; color: var(--muted); font-size: 0.95rem; font-weight: 500; transition: 0.2s; border: none; background: none; width: 100%; text-align: left; margin-bottom: 4px; }
        .nav-item:hover { color: var(--text); background: var(--surface2); }
        .nav-item.active { color: var(--accent); background: rgba(216, 166, 255, 0.1); }
        .sidebar-footer { margin-top: auto; }
        .logout-btn { color: var(--danger); }

        /* ── MAIN CONTENT ── */
        .main { margin-left: var(--sidebar-w); flex: 1; padding: 40px; max-width: 1200px; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        h1 { font-family: 'Syne', sans-serif; font-size: 2rem; }
        .greeting-sub { color: var(--muted); margin-top: 4px; }

        /* ── STATS GRID (O singură linie) ── */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }

        /* ── PROFILE GRID (3 Coloane fixe) ── */
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 32px; }

        .stat-card, .profile-field { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 24px; transition: 0.3s; min-height: 120px; display: flex; flex-direction: column; justify-content: center; }
        .pf-label { font-size: 0.75rem; text-transform: uppercase; color: var(--muted); letter-spacing: 1px; margin-bottom: 8px; }
        .stat-value, .pf-value { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 700; }
        .stat-value.accent { color: var(--accent); }

        /* ── BMI SCALE ── */
        .bmi-container { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 24px; margin-bottom: 32px; }
        .bmi-bar { height: 10px; border-radius: 10px; background: linear-gradient(to right, #5af5c8, #f5d05a, #ff5f9e); position: relative; margin: 20px 0; }
        .bmi-marker { width: 16px; height: 16px; background: #fff; border: 3px solid var(--accent); border-radius: 50%; position: absolute; top: -3px; transform: translateX(-50%); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* ── CALORIE RING (Aliniat la stânga) ── */
        .calorie-target-card {
            display: flex !important; flex-direction: row !important; align-items: center !important;
            justify-content: flex-start !important; gap: 25px; padding: 24px !important; min-height: auto !important; width: 100%;
        }
        .ring-container { position: relative; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .ring-container svg { transform: rotate(-90deg); }
        circle { fill: none; stroke-width: 6; stroke-linecap: round; }
        .ring-bg { stroke: var(--surface2); }
        .ring-progress { stroke: var(--accent); stroke-dasharray: 220; stroke-dashoffset: 220; transition: stroke-dashoffset 1s ease-in-out; }
        .ring-text { position: absolute; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.1rem; color: var(--text); }
        .calorie-info { text-align: left; }
        .calorie-info h3 { font-family: 'Syne', sans-serif; font-size: 1.1rem; margin-bottom: 4px; }
        .calorie-info p { color: var(--muted); font-size: 0.85rem; margin-bottom: 10px; }
        .goal-badge-styled { display: inline-block; padding: 4px 12px; background: rgba(216, 166, 255, 0.1); border-radius: 20px; color: var(--accent); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        /* ── FORM ELEMENTS ── */
        input, select { width: 100%; background: var(--surface2); border: 1px solid var(--border); padding: 10px; border-radius: 10px; color: #fff; font-family: inherit; margin-top: 5px; outline: none; }
        input:focus { border-color: var(--accent); }

        /* ── BUTTONS ── */
        .btn-update, .btn-save { background: var(--accent); color: #000; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 700; cursor: pointer; font-family: 'Syne'; transition: 0.2s; }
        .btn-update:hover { background: var(--accent-dim); transform: translateY(-2px); }
        .btn-cancel { background: transparent; color: var(--muted); border: 1px solid var(--border); padding: 12px 24px; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .btn-cancel:hover { color: var(--text); background: var(--surface2); }

        .profile-actions { display: flex; gap: 12px; margin-top: 20px; justify-content: flex-end; }

        /* ── DANGER ZONE ── */
        .danger-card { background: rgba(255, 122, 162, 0.03); border: 1px solid rgba(255, 122, 162, 0.2); border-radius: 20px; padding: 30px; display: flex; justify-content: space-between; align-items: center; margin-top: 40px; }
        .btn-delete { color: var(--danger); background: rgba(255, 122, 162, 0.1); border: 1px solid var(--danger); padding: 12px 24px; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-delete:hover { background: var(--danger); color: #fff; }
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="logo">Go<span>Fit</span></div>
    <button class="nav-item active" onclick="showPage('overview')" id="nav-overview">📊 Overview</button>
    <button class="nav-item" onclick="location.href='workouts.html'">🏋️ Workouts</button>
    <button class="nav-item" onclick="location.href='nutrition.html'">🍎 Nutrition</button>
    <button class="nav-item" onclick="showPage('profile')" id="nav-profile">👤 Profile</button>
    <div class="sidebar-footer">
        <button class="nav-item logout-btn" onclick="logout()">🚪 Logout</button>
    </div>
</nav>

<main class="main">
    <div class="page active" id="page-overview">
        <div class="page-header">
            <div><h1 id="greeting">Welcome</h1><div class="greeting-sub" id="userName" style="font-family: 'Syne'; font-size: 1.1rem; color: var(--text); font-weight: 600;">User</div></div>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><div class="pf-label">Weight</div><div class="stat-value accent"><span id="stat-weight">0</span> kg</div></div>
            <div class="stat-card"><div class="pf-label">Height</div><div class="stat-value"><span id="stat-height">0</span> cm</div></div>
            <div class="stat-card"><div class="pf-label">BMI</div><div class="stat-value"><span id="stat-bmi">0.0</span></div><div class="greeting-sub" id="stat-bmi-label">Normal</div></div>
            <div class="stat-card"><div class="pf-label">Age</div><div class="stat-value"><span id="stat-age">0</span></div><div class="greeting-sub">years old</div></div>
        </div>
        <div class="bmi-container">
            <div class="pf-label">BMI Scale</div>
            <div class="bmi-bar"><div class="bmi-marker" id="bmiMarker" style="left: 0%"></div></div>
            <div class="greeting-sub" id="bmiStatus">Your BMI is loading...</div>
        </div>

        <div class="stat-card calorie-target-card">
            <div class="ring-container">
                <svg width="80" height="80">
                    <circle cx="40" cy="40" r="35" class="ring-bg"></circle>
                    <circle cx="40" cy="40" r="35" class="ring-progress" id="calorieRing"></circle>
                </svg>
                <div class="ring-text" id="ringNumber">0</div>
            </div>
            <div class="calorie-info">
                <h3>Daily Calorie Target</h3>
                <p>Based on your activity level and goal.</p>
                <div class="goal-badge-styled" id="goalBadge">Recommendation</div>
            </div>
        </div>
    </div>

    <div class="page" id="page-profile">
        <div class="page-header">
            <div><h1>Profile</h1><div class="greeting-sub">Manage your settings</div></div>
            <button class="btn-update" id="editProfileBtn" onclick="toggleEditMode()">✏️ Edit Profile</button>
        </div>
        <div class="profile-grid" id="profileGrid"></div>
        <div id="editActions" style="display: none;" class="profile-actions">
            <button class="btn-cancel" onclick="toggleEditMode()">Cancel</button>
            <button class="btn-save" onclick="updateProfile()">Save Changes</button>
        </div>
        <div class="danger-card">
            <div>
                <h3 style="color: var(--danger); font-family: 'Syne'; font-size: 1.3rem;">Danger Zone</h3>
                <p class="greeting-sub">Deleting your account is permanent and cannot be undone.</p>
            </div>
            <button class="btn-delete" onclick="deleteAccount()">Delete Account</button>
        </div>
    </div>
</main>

<script>
    const API = "http://localhost:8083";
    const token = localStorage.getItem("token");
    if (!token) window.location.href = "index.html";
    const headers = { "Content-Type": "application/json", "Authorization": "Bearer " + token };

    let isEditMode = false;
    let u = null;

    function showPage(name) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

        const page = document.getElementById('page-' + name);
        if(page) page.classList.add('active');

        const nav = document.getElementById('nav-' + name);
        if(nav) nav.classList.add('active');

        // 🔥 ADAUGĂ ACEASTĂ LINIE: Actualizează URL-ul în browser
        window.history.replaceState({}, document.title, "dashboard.html?page=" + name);
    }

    async function loadUser() {
        try {
            const res = await fetch(API + "/user/me", { headers });
            if (!res.ok) throw new Error("Auth failed");
            u = await res.json();

            document.getElementById("userName").innerText = (u.firstName || "") + " " + (u.lastName || "");
            document.getElementById("stat-weight").innerText = u.weight || 0;
            document.getElementById("stat-height").innerText = u.height || 0;
            document.getElementById("stat-bmi").innerText = u.bmi || "0.0";
            document.getElementById("stat-age").innerText = u.age || 0;

            const calories = u.dailyCalories || 0;
            document.getElementById("ringNumber").innerText = calories;
            const ring = document.getElementById("calorieRing");
            if (ring) {
                const percentage = Math.min(calories / 3000, 1);
                ring.style.strokeDashoffset = 220 - (220 * percentage);
            }

            const bmiNum = parseFloat(u.bmi) || 0;
            const pct = Math.min(100, Math.max(0, ((bmiNum - 10) / 30) * 100));
            document.getElementById("bmiMarker").style.left = pct + "%";
            const label = bmiNum < 18.5 ? "Underweight" : bmiNum < 25 ? "Normal weight" : bmiNum < 30 ? "Overweight" : "Obese";
            document.getElementById("bmiStatus").innerHTML = `Your BMI is <strong>${bmiNum}</strong> — ${label}`;
            document.getElementById("goalBadge").innerText = u.goal ? u.goal.replace('_', ' ') + " 🔥" : "No goal set";

            renderProfile();
        } catch (e) { console.error(e); }
    }

    function renderProfile() {
        const grid = document.getElementById("profileGrid");
        const goalLabels = { 'LOSE_WEIGHT': 'Lose Weight', 'MAINTAIN': 'Maintain', 'GAIN_WEIGHT': 'Gain Weight' };

        if (!isEditMode) {
            grid.innerHTML = `
                <div class="profile-field"><div class="pf-label">First Name</div><div class="pf-value">${u.firstName || '—'}</div></div>
                <div class="profile-field"><div class="pf-label">Last Name</div><div class="pf-value">${u.lastName || '—'}</div></div>
                <div class="profile-field"><div class="pf-label">Birth Date</div><div class="pf-value">${u.birthDate || '—'}</div></div>
                <div class="profile-field"><div class="pf-label">Gender</div><div class="pf-value">${u.gender || '—'}</div></div>
                <div class="profile-field"><div class="pf-label">Height</div><div class="pf-value">${u.height || 0} cm</div></div>
                <div class="profile-field"><div class="pf-label">Weight</div><div class="pf-value">${u.weight || 0} kg</div></div>
                <div class="profile-field"><div class="pf-label">Activity</div><div class="pf-value">${u.activityLevel || '—'}</div></div>
                <div class="profile-field"><div class="pf-label">Goal</div><div class="pf-value">${goalLabels[u.goal] || u.goal || '—'}</div></div>
                <div class="profile-field"><div class="pf-label">Email</div><div class="pf-value" style="font-size: 1rem;">${u.email}</div></div>
            `;
        } else {
            grid.innerHTML = `
                <div class="profile-field"><div class="pf-label">First Name</div><input id="edit-fn" value="${u.firstName || ''}"></div>
                <div class="profile-field"><div class="pf-label">Last Name</div><input id="edit-ln" value="${u.lastName || ''}"></div>
                <div class="profile-field"><div class="pf-label">Birth Date</div><input type="date" id="edit-birth" value="${u.birthDate || ''}"></div>
                <div class="profile-field" style="opacity: 0.6;"><div class="pf-label">Gender (Fixed)</div><div class="pf-value">${u.gender}</div></div>
                <div class="profile-field" style="opacity: 0.6;"><div class="pf-label">Height (Fixed)</div><div class="pf-value">${u.height} cm</div></div>
                <div class="profile-field"><div class="pf-label">Weight (kg)</div><input type="number" id="edit-w" value="${u.weight || 0}"></div>
                <div class="profile-field"><div class="pf-label">Activity</div><select id="edit-act">
                    <option value="SEDENTARY" ${u.activityLevel==='SEDENTARY'?'selected':''}>Sedentary</option>
                    <option value="LIGHT" ${u.activityLevel==='LIGHT'?'selected':''}>Light</option>
                    <option value="MODERATE" ${u.activityLevel==='MODERATE'?'selected':''}>Moderate</option>
                    <option value="ACTIVE" ${u.activityLevel==='ACTIVE'?'selected':''}>Active</option>
                </select></div>
                <div class="profile-field"><div class="pf-label">Goal</div><select id="edit-goal">
                    <option value="LOSE_WEIGHT" ${u.goal==='LOSE_WEIGHT'?'selected':''}>Lose Weight</option>
                    <option value="MAINTAIN" ${u.goal==='MAINTAIN'?'selected':''}>Maintain</option>
                    <option value="GAIN_WEIGHT" ${u.goal==='GAIN_WEIGHT'?'selected':''}>Gain Weight</option>
                </select></div>
                <div class="profile-field" style="opacity: 0.6;"><div class="pf-label">Email (Read Only)</div><div class="pf-value" style="font-size: 1rem;">${u.email}</div></div>
            `;
        }
    }

    function toggleEditMode() {
        isEditMode = !isEditMode;
        document.getElementById("editActions").style.display = isEditMode ? "flex" : "none";
        document.getElementById("editProfileBtn").style.display = isEditMode ? "none" : "block";
        renderProfile();
    }

    async function updateProfile() {
        // Colectăm datele
        const bodyData = {
            firstName: document.getElementById("edit-fn")?.value || u.firstName,
            lastName: document.getElementById("edit-ln")?.value || u.lastName,
            birthDate: document.getElementById("edit-birth")?.value || u.birthDate,
            weight: parseFloat(document.getElementById("edit-w")?.value) || u.weight,
            activityLevel: document.getElementById("edit-act")?.value || u.activityLevel,
            goal: document.getElementById("edit-goal")?.value || u.goal,
            height: u.height,
            gender: u.gender
        };

        try {
            const res = await fetch(API + "/user/profile", {
                method: "PUT",
                headers,
                body: JSON.stringify(bodyData)
            });

            if (res.ok) {
                alert("Profile Updated! ✨");

                // --- PASUL CRUCIAL PENTRU REVENIRE LA PROFILE ---
                isEditMode = false; // Dezactivăm modul de editare

                // Ascundem zona de Save/Cancel și afișăm butonul de Edit Profile
                document.getElementById("editActions").style.display = "none";
                document.getElementById("editProfileBtn").style.display = "block";

                // Reîncărcăm datele de la server și redesenăm cardurile (fără input-uri)
                await loadUser();
                // ------------------------------------------------

            } else {
                alert("Error updating profile.");
            }
        } catch (e) {
            console.error("Update error:", e);
        }
    }

    async function deleteAccount() {
        if (confirm("Delete permanently? This cannot be undone.")) {
            await fetch(API + "/user/profile", { method: "DELETE", headers }); logout();
        }
    }

    function logout() { localStorage.clear(); window.location.href = "index.html"; }

    async function initDashboard() {
        await loadUser(); // Așteptăm să se încarce datele (u.firstName, etc.)

        // Citim parametrul "page" din URL (ex: ?page=profile)
        const urlParams = new URLSearchParams(window.location.search);
        const requestedPage = urlParams.get('page');

        if (requestedPage === 'profile') {
            showPage('profile'); // Dacă în URL scrie profile, deschidem profilul
        } else {
            showPage('overview'); // Altfel, rămânem pe dashboard
        }
    }
    initDashboard();
</script>
</body>
</html>
