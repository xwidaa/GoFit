<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GoFit — Admin Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0a14; --surface: #1a1224; --border: #2d1f3d;
            --accent: #d8a6ff; --text: #f5ecff; --muted: #b8a7cc;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding: 40px; }
        h1 { font-family: 'Syne', sans-serif; margin-bottom: 20px; }

        .admin-table {
            width: 100%; border-collapse: collapse; background: var(--surface);
            border-radius: 12px; overflow: hidden; border: 1px solid var(--border);
        }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: rgba(216, 166, 255, 0.1); color: var(--accent); text-transform: uppercase; font-size: 0.75rem; }
        tr:hover { background: rgba(255, 255, 255, 0.02); }

        .role-badge {
            padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 700;
            background: rgba(216, 166, 255, 0.2); color: var(--accent);
        }
    </style>
</head>
<body>
<h1>Admin Control Panel 🛡️</h1>
<p style="color: var(--muted); margin-bottom: 30px;">Managing all GoFit users and system data.</p>

<table class="admin-table">
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Role</th>
        <th>Goal</th>
        <th>Status</th>
    </tr>
    </thead>
    <tbody id="userTableBody">
    </tbody>
</table>

<script>
    const token = localStorage.getItem("token");
    if (!token) window.location.href = "index.html";

    async function fetchAllUsers() {
        try {
            const res = await fetch("http://localhost:8083/admin/users", {
                headers: { "Authorization": "Bearer " + token }
            });

            if (res.status === 403) {
                alert("Access Denied: You are not an Admin!");
                window.location.href = "dashboard.html";
                return;
            }

            const users = await res.json();
            const tbody = document.getElementById("userTableBody");

            tbody.innerHTML = users.map(u => `
                    <tr>
                        <td>${u.id}</td>
                        <td>${u.firstName} ${u.lastName}</td>
                        <td>${u.email}</td>
                        <td><span class="role-badge">${u.role}</span></td>
                        <td>${u.goal}</td>
                        <td style="color: #5af5c8;">Active</td>
                    </tr>
                `).join("");

        } catch (e) {
            console.error("Error loading users:", e);
        }
    }

    fetchAllUsers();
</script>
</body>
</html>
